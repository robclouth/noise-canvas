name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install
      - name: Build application on Windows
        if: runner.os == 'Windows'
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build application on macOS
        if: runner.os == 'macOS'
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build application on Linux
        if: runner.os == 'Linux'
        run: npm run build:linux
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Upload ONLY the distributable installer-ish artifacts for each OS.
      # (We do not upload the entire app bundle contents.)
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-dist
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*-setup.exe
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    # This lets us create a Release and upload assets.
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Create/publish the GitHub Release from the tag, attach installers.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

          # Avoid failing if e.g. Linux didn't build .deb, etc.
          fail_on_unmatched_files: false

          # Only attach installer files + update manifests, not raw bundle internals.
          files: |
            artifacts/**/dist/*.dmg
            artifacts/**/dist/*.zip
            artifacts/**/dist/*-setup.exe
            artifacts/**/dist/*.exe
            artifacts/**/dist/*.AppImage
            artifacts/**/dist/*.deb
            artifacts/**/dist/latest*.yml
